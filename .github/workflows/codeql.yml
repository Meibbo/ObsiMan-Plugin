name: 'CodeQL'

on:
  push:
    branches: ['main', 'hardening', 'hardening-refactor']
  pull_request:
    branches: ['main', 'hardening']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CODEQL_ACTION_FILE_COVERAGE_ON_PRS: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{matrix.language}}'

  query-tests:
    name: Custom query tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CodeQL
        uses: github/codeql-action/setup-codeql@v4

      - name: Run custom CodeQL query tests
        run: codeql test run --additional-packs codeql/queries/javascript codeql/tests --threads=0
